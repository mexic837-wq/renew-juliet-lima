<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Bienvenido a Renew! - Juliet Lima</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyanAccent: '#00bcd4', // Based on typical Renew logo colors
                        tealAccent: '#00838f', // Hover state
                        brandYellow: '#ffb300' // Yellow from logo
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .gradient-btn {
            background: linear-gradient(135deg, #00bcd4 0%, #00838f 100%);
        }
        .gradient-btn:hover {
            opacity: 0.9;
        }
        .success-animation {
            animation: fadeInScale 0.5s ease-out forwards;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Container -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden p-8 success-animation">
        
        <!-- Header & Logo -->
        <header class="text-center mb-8">
            <div class="flex justify-center mb-6">
                <!-- Logo de Renew -->
                <img src="renew-water-1-colores-copia.png" alt="Renew Logo" class="w-32 h-auto">
            </div>
            <h1 class="text-2xl font-bold text-cyanAccent mb-2">Juliet Lima te invita a Renew</h1>
            <p class="text-gray-500 text-sm">Déjanos tus datos y te contactaremos pronto.</p>
        </header>

        <!-- Formulario #form-referidos -->
        <form id="form-referidos" class="space-y-4">
            
            <!-- Hidden Source Field -->
            <input type="hidden" name="source" id="source" value="">

            <!-- Nombre Completo -->
            <div>
                <label for="nombre" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 px-1">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyanAccent/50 focus:border-cyanAccent transition-all" 
                    placeholder="Ej: Juan Pérez">
            </div>

            <!-- Correo Electrónico -->
            <div>
                <label for="email" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 px-1">Correo Electrónico</label>
                <input type="email" id="email" name="email" required 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyanAccent/50 focus:border-cyanAccent transition-all" 
                    placeholder="ejemplo@correo.com">
            </div>

            <!-- Teléfono / WhatsApp -->
            <div>
                <label for="telefono" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 px-1">Teléfono / WhatsApp</label>
                <div class="relative">
                    <input type="tel" id="telefono" name="telefono" required 
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyanAccent/50 focus:border-cyanAccent transition-all" 
                        placeholder="Incluye código de área">
                </div>
            </div>

            <!-- Ubicación -->
            <div>
                <label for="ubicacion" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 px-1">Ubicación (Estado/Ciudad)</label>
                <input type="text" id="ubicacion" name="ubicacion" 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyanAccent/50 focus:border-cyanAccent transition-all" 
                    placeholder="Ej: Florida, USA">
            </div>

            <!-- Botón de Acción -->
            <div class="pt-4">
                <button type="submit" id="btn-submit" 
                    class="w-full gradient-btn text-white font-bold py-4 px-6 rounded-xl text-lg shadow-lg shadow-cyanAccent/20 transform active:scale-[0.98] transition-all">
                    Enviar mi solicitud
                </button>
            </div>
        </form>

        <!-- Mensaje de Éxito (Oculto inicialmente) -->
        <div id="mensaje-exito" class="hidden text-center py-12 success-animation">
            <div class="flex justify-center mb-6">
                <div class="bg-green-100 p-4 rounded-full">
                    <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">¡Gracias!</h2>
            <p class="text-gray-600">Solicitud enviada exitosamente. Te contactaremos pronto.</p>
        </div>

    </div>

    <!-- JavaScript Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('form-referidos');
            const sourceInput = document.getElementById('source');
            const mensajeExito = document.getElementById('mensaje-exito');
            const btnSubmit = document.getElementById('btn-submit');

            // Captura URL Param 'src'
            const urlParams = new URLSearchParams(window.location.search);
            const srcValue = urlParams.get('src');
            if (srcValue) {
                sourceInput.value = srcValue;
            }

            // Webhook URL (n8n) - Change to production if needed
            const WEBHOOK_URL = 'https://n8n.renew-solar.com/webhook-test/referidos'; // Placeholder - Using generic domain

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Button loading state
                const originalBtnText = btnSubmit.innerText;
                btnSubmit.disabled = true;
                btnSubmit.innerText = 'Enviando...';
                btnSubmit.classList.add('opacity-50');

                // Recolectar datos
                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                try {
                    // Fetch POST to n8n
                    const response = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    if (response.ok || response.status === 200) {
                        // Success UI
                        form.classList.add('hidden');
                        mensajeExito.classList.remove('hidden');
                    } else {
                        throw new Error('Error al enviar el formulario');
                    }
                } catch (error) {
                    console.error('Submission Error:', error);
                    alert('Hubo un error al enviar tu solicitud. Por favor intenta de nuevo.');
                    
                    // Reset button
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = originalBtnText;
                    btnSubmit.classList.remove('opacity-50');
                }
            });
        });
    </script>

</body>
</html>
